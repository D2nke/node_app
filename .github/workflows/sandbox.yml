name: Sandbox (Node)

on:
  workflow_dispatch:

jobs:
  sandbox-info:
    name: "ℹ️  Sandbox Deployment Info"
    runs-on: ubuntu-latest
    steps:
      - name: "📋 Display deployment context"
        run: |
          echo "🎯 Sandbox Deployment Started"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Trigger: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Environment: dev"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  pre-build:
    name: Pre-Build Validation
    needs: sandbox-info
    uses: D2nke/my_workflows/.github/workflows/pre-build.yml@latest

  tests:
    name: Unit Tests
    needs: pre-build
    uses: D2nke/my_workflows/.github/workflows/test-node.yml@latest
    secrets: inherit

  security:
    name: Security Scan
    needs: tests
    uses: D2nke/my_workflows/.github/workflows/security-scan.yml@latest
    with:
      sonar_project_key: ${{ github.repository_owner }}-${{ github.event.repository.name }}-dev
      sonar_organization: ${{ vars.SONAR_ORGANIZATION || '' }}
      enable_snyk: true
      enable_sonar: true
      coverage_report_paths: "coverage/lcov.info,coverage/coverage-summary.json"
    secrets: inherit

  docker-build:
    name: Build Docker Image
    needs: security
    uses: D2nke/my_workflows/.github/workflows/build-docker.yml@latest
    with:
      image_name: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
      dockerfile: ./Dockerfile
      context: .
      tag: ${{ github.sha }}-dev

  sandbox-deploy:
    name: "🚀 Deploy to Sandbox"
    needs: docker-build
    uses: D2nke/my_workflows/.github/workflows/deploy.yml@latest
    with:
      fly_app: ${{ vars.FLY_APP_DEV }}
      environment: dev
      image_name: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
      image_tag: ${{ github.sha }}-dev
    secrets: inherit
