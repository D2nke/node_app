name: Sandbox (Node)

on:
  workflow_dispatch:
    inputs:
      enable-test:
        type: boolean
        default: false
      enable-sonar:
        type: boolean
        default: false
      enable-snyk:
        type: boolean
        default: false

jobs:
  node-sandbox-build:
    name: "🚀 Node Build Sandbox"
    uses: D2nke/my_workflows/node_build.yml@feat/new_base
    with:
      enable-test: ${{ inputs.enable-test }}
      enable-sonar: ${{ inputs.enable-sonar }}
      enable-snky: ${{ inputs.enable-snky }}
    secrets: inherit

