name: Release (Node)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'

jobs:
  pre-build:
    name: Pre-Build Validation
    uses: D2nke/my_workflows/.github/workflows/pre-build.yml@latest

  tests:
    name: Unit Tests
    needs: pre-build
    uses: D2nke/my_workflows/.github/workflows/test-node.yml@latest
    secrets: inherit

  security-scan:
    name: Security Scan (Snyk + SonarQube)
    needs: tests
    uses: D2nke/my_workflows/.github/workflows/security-scan.yml@latest
    with: 
      sonar_project_key: ${{ github.repository_owner }}-${{ github.event.repository.name }}
      sonar_organization: ${{ vars.SONAR_ORGANIZATION || '' }}
      enable_snyk: true
      enable_sonar: true
      coverage_report_paths: "coverage/lcov.info,coverage/coverage-summary.json"
    secrets: inherit

  docker-build:
    name: Build Docker Image
    needs: security-snyk
    uses: D2nke/my_workflows/.github/workflows/build-docker.yml@latest
    with:
      image_name: docker.io/${{ secrets.DOCKER_USERNAME }}/my-app
      dockerfile: ./Dockerfile
      context: .
      tag: ${{ github.sha }}
    secrets: inherit

  deploy:
    name: Deploy Application
    needs: docker-build
    uses: D2nke/my_workflows/.github/workflows/deploy.yml@latest
    with:
      target: server
      environment: prd
      image_name: docker.io/${{ secrets.DOCKER_USERNAME }}/my-app
    secrets: inherit
    continue-on-error: true