name: Release (Node)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  pre-build:
    name: Pre-Build Validation
    uses: D2nke/my_workflows/.github/workflows/pre-build.yml@fix/bugs

  tests:
    name: Unit Tests
    needs: pre-build
    uses: D2nke/my_workflows/.github/workflows/test-node.yml@fix/bugs
    secrets: inherit

  security-scan:
    name: Security Scan (Snyk + SonarQube)
    needs: tests
    uses: D2nke/my_workflows/.github/workflows/security-scan.yml@fix/bugs
    with:
      sonar_project_key: ${{ github.repository_owner }}-${{ github.event.repository.name }}
      sonar_organization: ${{ vars.SONAR_ORGANIZATION || '' }}
      enable_snyk: true
      enable_sonar: true
      coverage_report_paths: "coverage/lcov.info,coverage/coverage-summary.json"
    secrets: inherit

  docker-build:
    name: Build Docker Image
    needs: security-scan
    uses: D2nke/my_workflows/.github/workflows/build-docker.yml@fix/bugs
    with:
      image_name: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
      dockerfile: ./Dockerfile
      context: .
      tag: ${{ github.sha }}
    secrets: inherit

  deploy:
    name: Deploy Application
    needs: docker-build
    uses: D2nke/my_workflows/.github/workflows/deploy.yml@fix/bugs
    with:
      fly_app: ${{ vars.FLY_APP_NAME }}
      environment: prd
      image_name: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
      image_tag: ${{ github.sha }}
    secrets: inherit

  release-tag:
    name: Create Release Tag
    needs: deploy
    runs-on: ubuntu-fix/bugs
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📝 Gerando versão..."
        id: version
        run: |
          VERSION="v0.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "→ Version: $VERSION"

      - name: "🏷️  Criando git tag..."
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a ${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
          git push origin ${{ steps.version.outputs.version }}
          echo "✓ Tag ${{ steps.version.outputs.version }} criada e enviada"

      - name: "✓ Release concluído"
        run: echo "✓ Release ${{ steps.version.outputs.version }} finalizado"
