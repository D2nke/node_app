name: CI

on:
  push:
    branches: ["node"]
  pull_request:
    branches: ["node"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  security:
    needs: test
    uses: D2nke/my_workflows/.github/workflows/security-scan.yml@main
    with:
      sonar_project_key: my-apps-demo-node
      enable_mend: true
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}
      mend_api_key: ${{ secrets.MEND_API_KEY }}

  build:
    needs: security
    uses: D2nke/my_workflows/.github/workflows/build-docker.yml@main
    with:
      image_name: ghcr.io/D2nke/my-apps-demo-node
    secrets:
      registry_username: ${{ github.actor }}
      registry_password: ${{ secrets.GITHUB_TOKEN }}

  deploy-dev:
    needs: build
    uses: D2nke/my_workflows/.github/workflows/deploy.yml@main
    with:
      target: server
      environment: dev
      image_name: ghcr.io/D2nke/my-apps-demo-node
    secrets:
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
